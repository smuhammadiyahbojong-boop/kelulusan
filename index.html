<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan SMK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center animate__animated animate__fadeIn">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">Pengumuman Kelulusan</h1>
    <p class="text-gray-500 mb-6">Tahun Pelajaran 2025/2026</p>

    <div id="ui-container">
      <input type="text" id="nisn" placeholder="Masukkan NISN Anda" 
             class="w-full p-4 mb-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none transition">
      <button onclick="cekKelulusan()" id="btn-cek"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition">
        Lihat Hasil
      </button>
    </div>

    <div id="result" class="hidden animate__animated animate__zoomIn">
      <div class="p-6 bg-gray-50 rounded-2xl mb-4 text-left">
        <p class="text-xs text-gray-400 font-bold tracking-widest uppercase">Identitas Siswa</p>
        <h2 id="nama" class="text-lg font-bold text-gray-800"></h2>
        <p id="jurusan" class="text-gray-600"></p>
      </div>
      <div id="status-card" class="p-8 rounded-2xl text-white font-black text-4xl shadow-lg mb-4">
        <p id="status-text"></p>
      </div>
      <button onclick="location.reload()" class="text-blue-600 underline text-sm">Cek NISN lain</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3ePkENCn0wGxjga3MGJ7zyRdyRXWHt47EXyrWWoTzkBtPIhKHbRdad84y2X1MudXa/exec";

    async function cekKelulusan() {
      const btn = document.getElementById('btn-cek');
      const nisn = document.getElementById('nisn').value;
      
      btn.innerText = "Memeriksa...";
      
      try {
        const response = await fetch(`${SCRIPT_URL}?nisn=${nisn}`);
        const data = await response.json();

        if (data.status === "closed") {
          alert("Pengumuman belum dibuka. Silakan kembali pukul 18:00 WIB.");
        } else if (data.status === "found") {
          document.getElementById('ui-container').classList.add('hidden');
          document.getElementById('result').classList.remove('hidden');
          
          document.getElementById('nama').innerText = data.nama;
          document.getElementById('jurusan').innerText = data.jurusan;
          
          const statusCard = document.getElementById('status-card');
          statusCard.innerText = data.statusLulus;
          statusCard.classList.add(data.statusLulus === "LULUS" ? "bg-green-500" : "bg-red-500");
        } else {
          alert("NISN tidak ditemukan!");
        }
      } catch (e) {
        alert("Terjadi kesalahan jaringan.");
      } finally {
        btn.innerText = "Lihat Hasil";
      }
    }
  </script>
</body>
</html>
