<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan SMK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center animate__animated animate__fadeIn">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Pengumuman Kelulusan</h1>
    <p class="text-gray-500 mb-6">Tahun Pelajaran 2025/2026</p>

    <div id="login-form" class="space-y-4">
      <input type="text" id="nisn" placeholder="Masukkan NISN Anda" 
             class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none transition">
      <button onclick="cekKelulusan()" id="btn-cek"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition shadow-lg">
        Lihat Hasil
      </button>
    </div>

    <div id="result" class="hidden animate__animated animate__zoomIn space-y-4">
      <div class="p-4 bg-blue-50 rounded-lg">
        <p class="text-sm text-blue-600 font-bold">IDENTITAS SISWA</p>
        <h2 id="nama" class="text-xl font-bold text-gray-800"></h2>
        <p id="jurusan" class="text-gray-600"></p>
      </div>
      
      <div id="status-card" class="p-6 rounded-xl text-white font-black text-3xl shadow-lg">
        <p id="status-text"></p>
      </div>
      
      <button onclick="location.reload()" class="text-gray-400 hover:text-gray-600 text-sm underline">Cek NISN lain</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyu-cq_NLAkBlv-8ERQ0LFPEfhLl9j9WlCKhy513P6wx9Zl0lB6VGI5pkSH-4p9Pjaf/exec";

    async function cekKelulusan() {
      const btn = document.getElementById('btn-cek');
      const nisn = document.getElementById('nisn').value;
      
      btn.innerText = "Memproses...";
      
      try {
        const response = await fetch(`${SCRIPT_URL}?nisn=${nisn}`);
        const data = await response.json();

        if (data.status === "found") {
          document.getElementById('login-form').classList.add('hidden');
          const resultDiv = document.getElementById('result');
          resultDiv.classList.remove('hidden');
          
          document.getElementById('nama').innerText = data.nama;
          document.getElementById('jurusan').innerText = data.jurusan;
          
          const statusCard = document.getElementById('status-card');
          const statusText = document.getElementById('status-text');
          
          statusText.innerText = data.statusLulus;
          statusCard.className = data.statusLulus === "LULUS" ? "p-6 rounded-xl text-white font-black text-3xl shadow-lg bg-green-500" : "p-6 rounded-xl text-white font-black text-3xl shadow-lg bg-red-500";
        } else {
          alert("NISN tidak ditemukan.");
          btn.innerText = "Lihat Hasil";
        }
      } catch (e) {
        alert("Terjadi kesalahan, coba lagi.");
        btn.innerText = "Lihat Hasil";
      }
    }
  </script>
</body>
</html>
